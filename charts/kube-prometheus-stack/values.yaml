# Frugal single-node observability stack.
# Alertmanager is disabled to save resources — add it back when alerting is needed.
# Grafana persistence is off; dashboards can be re-imported from provisioned ConfigMaps.
kube-prometheus-stack:
  alertmanager:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        memory: 256Mi

  prometheus:
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  grafana:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    persistence:
      enabled: false

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

alloy:
  alloy:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

tempo:
  tempo:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
  persistence:
    enabled: false
